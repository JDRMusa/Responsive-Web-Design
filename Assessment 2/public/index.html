<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Tower Defense — Vanilla Canvas</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="ui">
    <div id="hud">
      <div id="stats">
        <div>Gold: <span id="gold">0</span></div>
        <div>Lives: <span id="lives">0</span></div>
        <div>Wave: <span id="wave">0</span></div>
        <div>Score: <span id="score">0</span></div>
      </div>

      <div id="controls">
        <button id="startBtn">Start Wave</button>
        <button id="restartBtn">Restart</button> 
        <div>
          <button id="selArrow" class="sel">Arrow Tower (50g)</button>
          <button id="selFrost">Frost Tower (30g)</button>
          <button id="selBomb">Bomb Tower (60g)</button>
        </div>
        <div>
          <button id="upgradeBtn" style="display:none">Upgrade Tower</button>
          <button id="sellBtn" style="display:none">Sell Tower</button>
        </div>
      </div>
    </div>

    <div id="scoreboard">
      <h3>Leaderboard</h3>
      <ol id="leaderboard"></ol>
      <div id="submitScore">
        <input id="playerName" placeholder="Your name" maxlength="30"/>
        <button id="submitBtn">Submit Score</button>
      </div>
    </div>
  </div>

  <canvas id="gameCanvas"></canvas>

  <script src="game.js"></script>
</body>
</html>
